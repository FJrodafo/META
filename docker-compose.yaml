services:
  # Database
  db:
    image: mysql:8.0
    container_name: meta_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - wpsite
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
  #PHPMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: meta_pma
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - wpsite
  # WordPress
  wordpress:
    image: wordpress:6.9-apache
    container_name: meta_wp
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    networks:
      - wpsite
    volumes:
      - wp_data:/var/www/html
      - ./wordpress/wp-content:/var/www/html/wp-content
  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: meta_nx
    restart: always
    depends_on:
      - wordpress
    ports:
      - "${NGINX_PORT}:80"
    networks:
      - wpsite
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
# Networks
networks:
  wpsite:
# Volumes
volumes:
  db_data:
  wp_data:
