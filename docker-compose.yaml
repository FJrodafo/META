# META Channel Corporation
# https://metachannelcorp.vercel.app/

services:
  # Database
  db:
    image: mysql:8.0
    container_name: meta_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    #ports:
    #  - "${MYSQL_PORT}"
    networks:
      - meta_network
    volumes:
      - meta_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: meta_pma
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: ${PMA_HOST}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT}"
    networks:
      - meta_network
    restart: unless-stopped
  # WordPress
  wordpress:
    image: wordpress:6.9.4-php8.2-apache
    container_name: meta_wp
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    #ports:
    #  - "${WORDPRESS_PORT}"
    networks:
      - meta_network
    volumes:
      - meta_wp_data:/var/www/html
    restart: unless-stopped
  # Nginx
  nginx:
    image: nginx:alpine
    container_name: meta_nx
    depends_on:
      - wordpress
    ports:
      - "${NGINX_PORT}"
    networks:
      meta_network:
        aliases:
          - metachannelcorp.com
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
# Networks
networks:
  meta_network:
    name: meta_network
# Volumes
volumes:
  meta_db_data:
    name: meta_db_data
  meta_wp_data:
    name: meta_wp_data
