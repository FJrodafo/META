# Redirect (.ie) to (.com)
server {
    listen 80;
    server_name metachannelcorp.ie metachannelcorporation.ie metachannelcorporation.com;

    return 301 http://metachannelcorp.com$request_uri;
}

# Main server (WordPress)
server {
    listen 80;
    server_name metachannelcorp.com;

    location / {
        proxy_pass http://wordpress:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
